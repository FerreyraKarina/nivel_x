<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> //es lo que hace que la página sea responsive.Sin esa línea, en el celular vería todo diminuto.
  <title>Nivel x </title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="logo-area">
      <h1>🎮 Nivel X </h1>
    </div>
    <nav>
      <a href="index.html" class="active">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="carrito.html">Carrito</a>
      <a href="http://localhost:3000/login" target="_blank">Admin</a>
    </nav>
    <button class="btn-tema" id="btn-tema">🌙 Oscuro</button>
    <span class="alumnos">Kari · Mia</span>
  </header>

  <main>
    <div class="bienvenida">
      <h2>Bienvenido a Nivel X ! </h2>
      <p>Ingresá tu nombre para comenzar</p>
      <input type="text" id="input-nombre" placeholder="Tu nombre..." maxlength="30">
      <button class="btn btn-primario" id="btn-continuar" style="width: 100%;">Continuar</button>
    </div>
  </main>

  <script>
    const temaGuardado = localStorage.getItem('tema')
    if (temaGuardado === 'dark') {
      document.body.classList.add('dark')
      document.getElementById('btn-tema').textContent = '☀️ Claro'
    }

    document.getElementById('btn-continuar').addEventListener('click', () => {
      const nombre = document.getElementById('input-nombre').value.trim()
      if (!nombre) {
        alert('Ingresá tu nombre para continuar')
        return
      }
      localStorage.setItem('usuario', nombre)
      window.location.href = 'productos.html'
    })

    document.getElementById('input-nombre').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('btn-continuar').click()
      }
    })

    document.getElementById('btn-tema').addEventListener('click', () => {
      document.body.classList.toggle('dark')
      const esDark = document.body.classList.contains('dark')
      localStorage.setItem('tema', esDark ? 'dark' : 'light')
      document.getElementById('btn-tema').textContent = esDark ? '☀️ Claro' : '🌙 Oscuro'
    })
  </script>
</body>
</html>
