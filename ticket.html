<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel X - Ticket</title>
  <link rel="icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <header>
    <div class="logo-area"><h1>🎮 Nivel X</h1></div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="http://localhost:3000/login" target="_blank">Admin</a>
    </nav>
    <button class="btn-tema" id="btn-tema">🌙 Oscuro</button>
    <span class="alumnos">kari  · mia</span>
  </header>

  <main id="contenido"></main>

  <script>
    function init() {
      const temaGuardado = localStorage.getItem('tema')
      if (temaGuardado === 'dark') {
        document.body.classList.add('dark')
        document.getElementById('btn-tema').textContent = '☀️ Claro'
      }

      renderTicket()
    }

    function renderTicket() {
      const ticketRaw = localStorage.getItem('ultimoTicket')
      const main = document.getElementById('contenido')

      if (!ticketRaw) {
        main.innerHTML = `
          <div class="vacio">
            <p>No hay ningún ticket disponible</p>
            <br>
            <a href="productos.html">Ir a productos →</a>
          </div>
        `
        return
      }

      const ticket = JSON.parse(ticketRaw)

      const itemsHtml = ticket.productos.map(p => `
        <div class="ticket-item">
          <div class="ticket-item-nombre">
            ${p.nombre}
            <small>$${p.precio.toLocaleString('es-AR')} c/u</small>
          </div>
          <div class="ticket-item-cant">x${p.cantidad}</div>
          <div class="ticket-item-precio">$${(p.precio * p.cantidad).toLocaleString('es-AR')}</div>
        </div>
      `).join('')

      main.innerHTML = `
        <div class="ticket" id="ticket-imprimible">
          <div class="ticket-header">
            <h2>🎮 Nivel X</h2>
            <p>Comprobante de compra</p>
          </div>
          <div class="ticket-datos">
            <div><span>Cliente</span>${ticket.usuario}</div>
            <div><span>Fecha</span>${ticket.fecha}</div>
          </div>
          ${itemsHtml}
          <div class="ticket-total">
            <span>Total</span>
            <span>$${ticket.total.toLocaleString('es-AR')}</span>
          </div>
          <div class="ticket-footer">
            ¡Gracias por tu compra en GameVault!
          </div>
        </div>
        <div class="acciones">
          <button class="btn btn-secundario" onclick="descargarPDF()">📄 Descargar PDF</button>
          <button class="btn btn-primario" onclick="nuevaCompra()">Volver a empezar</button>
        </div>
      `
    }

    function descargarPDF() {
      const ticketRaw = localStorage.getItem('ultimoTicket')
      if (!ticketRaw) return
      const ticket = JSON.parse(ticketRaw)

      const { jsPDF } = window.jspdf
      const doc = new jsPDF()

      let y = 20
      doc.setFontSize(18)
      doc.text('Nivel X - Comprobante de compra', 14, y)
      y += 10
      doc.setFontSize(11)
      doc.text(`Cliente: ${ticket.usuario}`, 14, y)
      y += 7
      doc.text(`Fecha: ${ticket.fecha}`, 14, y)
      y += 10

      doc.setFontSize(12)
      doc.text('Productos:', 14, y)
      y += 8

      doc.setFontSize(10)
      ticket.productos.forEach(p => {
        const linea = `${p.nombre}  x${p.cantidad}  -  $${(p.precio * p.cantidad).toLocaleString('es-AR')}`
        doc.text(linea, 14, y)
        y += 7
      })

      y += 5
      doc.setFontSize(13)
      doc.text(`Total: $${ticket.total.toLocaleString('es-AR')}`, 14, y)

      doc.save(`ticket-gamevault-${Date.now()}.pdf`)
    }

    function nuevaCompra() {
      localStorage.removeItem('ultimoTicket')
      localStorage.removeItem('usuario')
      window.location.href = 'index.html'
    }

    document.getElementById('btn-tema').addEventListener('click', () => {
      document.body.classList.toggle('dark')
      const esDark = document.body.classList.contains('dark')
      localStorage.setItem('tema', esDark ? 'dark' : 'light')
      document.getElementById('btn-tema').textContent = esDark ? '☀️ Claro' : '🌙 Oscuro'
    })

    init()
  </script>
</body>
</html>
