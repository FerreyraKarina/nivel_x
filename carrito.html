<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameVault - Carrito</title>
  <link rel="icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <div class="logo-area"><h1>🎮 GameVault</h1></div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="carrito.html" class="active carrito-badge">
        Carrito
        <span class="badge" id="badge-carrito">0</span>
      </a>
      <a href="http://localhost:3000/login" target="_blank">Admin</a>
    </nav>
    <button class="btn-tema" id="btn-tema">🌙 Oscuro</button>
    <span class="alumnos">Kari · mia</span>
  </header>

  <main>
    <h2>Tu carrito</h2>
    <div id="contenido-carrito"></div>
  </main>

  <div class="modal-overlay" id="modal-confirmar">
    <div class="modal">
      <h3>Confirmar compra</h3>
      <p>¿Querés finalizar la compra? Se generará tu ticket.</p>
      <div class="modal-botones">
        <button class="btn btn-secundario" onclick="cerrarModal()">Cancelar</button>
        <button class="btn btn-primario" onclick="confirmarCompra()">Confirmar</button>
      </div>
    </div>
  </div>

  <script>
    function init() {
      const nombre = localStorage.getItem('usuario')
      if (!nombre) { window.location.href = 'index.html'; return }

      const temaGuardado = localStorage.getItem('tema')
      if (temaGuardado === 'dark') {
        document.body.classList.add('dark')
        document.getElementById('btn-tema').textContent = '☀️ Claro'
      }

      actualizarBadge()
      renderCarrito()
    }

    function obtenerCarrito() {
      return JSON.parse(localStorage.getItem('carrito')) || []
    }

    function guardarCarrito(carrito) {
      localStorage.setItem('carrito', JSON.stringify(carrito))
    }

    function renderCarrito() {
      const carrito = obtenerCarrito()
      const div = document.getElementById('contenido-carrito')

      if (carrito.length === 0) {
        div.innerHTML = `
          <div class="vacio">
            <p>Tu carrito está vacío</p>
            <br>
            <a href="productos.html">Ir a productos →</a>
          </div>
        `
        return
      }

      const itemsHtml = carrito.map(item => `
        <div class="item-carrito">
          <img src="${item.imagen}" alt="${item.nombre}" onerror="this.src='https://placehold.co/100x100/333/white?text=Sin+imagen'">
          <div class="item-info">
            <div class="item-nombre">${item.nombre}</div>
            <div class="item-precio">$${item.precio.toLocaleString('es-AR')} c/u</div>
          </div>
          <div class="item-controles">
            <button onclick="cambiarCantidad(${item.id}, -1)">−</button>
            <span class="item-cantidad">${item.cantidad}</span>
            <button onclick="cambiarCantidad(${item.id}, 1)">+</button>
          </div>
          <div class="item-subtotal">$${(item.precio * item.cantidad).toLocaleString('es-AR')}</div>
          <button class="btn-eliminar" onclick="eliminarItem(${item.id})" title="Eliminar">🗑️</button>
        </div>
      `).join('')

      const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0)
      const totalPrecio = carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0)

      div.innerHTML = `
        ${itemsHtml}
        <div class="resumen">
          <div class="resumen-fila"><span>Productos</span><span>${totalItems}</span></div>
          <div class="resumen-total"><span>Total</span><span>$${totalPrecio.toLocaleString('es-AR')}</span></div>
        </div>
        <div class="acciones">
          <a href="productos.html" class="btn btn-secundario">Seguir comprando</a>
          <button class="btn btn-primario" onclick="abrirModal()">Finalizar compra</button>
        </div>
      `
    }

    function cambiarCantidad(id, delta) {
      const carrito = obtenerCarrito()
      const item = carrito.find(i => i.id === id)
      if (!item) return

      item.cantidad += delta

      if (item.cantidad <= 0) {
        const index = carrito.findIndex(i => i.id === id)
        carrito.splice(index, 1)
      }

      guardarCarrito(carrito)
      actualizarBadge()
      renderCarrito()
    }

    function eliminarItem(id) {
      let carrito = obtenerCarrito()
      carrito = carrito.filter(i => i.id !== id)
      guardarCarrito(carrito)
      actualizarBadge()
      renderCarrito()
    }

    function abrirModal() {
      document.getElementById('modal-confirmar').classList.add('activo')
    }

    function cerrarModal() {
      document.getElementById('modal-confirmar').classList.remove('activo')
    }

    function confirmarCompra() {
      const carrito = obtenerCarrito()
      const nombre = localStorage.getItem('usuario')

      const ticket = {
        usuario: nombre,
        fecha: new Date().toLocaleString('es-AR'),
        productos: carrito,
        total: carrito.reduce((acc, item) => acc + (item.precio * item.cantidad), 0)
      }

      localStorage.setItem('ultimoTicket', JSON.stringify(ticket))
      localStorage.removeItem('carrito')

      window.location.href = 'ticket.html'
    }

    function actualizarBadge() {
      const carrito = obtenerCarrito()
      const total = carrito.reduce((acc, p) => acc + p.cantidad, 0)
      document.getElementById('badge-carrito').textContent = total
    }

    document.getElementById('btn-tema').addEventListener('click', () => {
      document.body.classList.toggle('dark')
      const esDark = document.body.classList.contains('dark')
      localStorage.setItem('tema', esDark ? 'dark' : 'light')
      document.getElementById('btn-tema').textContent = esDark ? '☀️ Claro' : '🌙 Oscuro'
    })

    init()
  </script>
</body>
</html>
